<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeriAI — AI Trust Auditor Platform</title>
    <meta name="description" content="VeriAI detects, scores, explains, and corrects bias and hallucinations in AI systems. Comprehensive AI governance and trust scoring." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="src/style.css?v=15" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Ambient background glow -->
    <div class="ambient-glow"></div>

    <!-- Mobile hamburger button -->
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="#/" style="text-decoration: none; color: inherit;">
                <div class="sidebar-brand">
                    <div class="brand-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <path d="M4 14l6 8 14-16" stroke="url(#brandGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs><linearGradient id="brandGrad" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                        </svg>
                    </div>
                    <span class="brand-name">VeriAI Auditor</span>
                </div>
            </a>

            <nav class="sidebar-nav">
                <a href="#/dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <span class="nav-icon">⚏</span>
                    <span class="nav-label">Overview</span>
                </a>
                <a href="#/audit" class="nav-item" data-page="audit" id="nav-audit">
                    <span class="nav-icon">◱</span>
                    <span class="nav-label">Explainability</span>
                </a>
                <a href="#/reports" class="nav-item" data-page="reports" id="nav-reports">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Reports</span>
                </a>
                <a href="#/review" class="nav-item" data-page="review" id="nav-review">
                    <span class="nav-icon">👁️</span>
                    <span class="nav-label">Review Queue</span>
                </a>
                <a href="#/settings" class="nav-item" data-page="settings" id="nav-settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="system-status">
                    <span class="status-dot online"></span>
                    <span class="status-text">System Online</span>
                </div>
            </div>
        </aside>

        <!-- Main content area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h2 class="page-title" id="page-title">Dashboard</h2>
                </div>
                <div class="top-bar-right">
                    <span class="top-bar-badge">AI Trust Auditor</span>
                    <div class="top-bar-avatar">VA</div>
                </div>
            </header>

            <div class="content-area" id="app-root">
                <!-- Pages injected here by main.js -->
            </div>
        </main>
    </div>

    <script src="src/main.js?v=15" type="module"></script>
    <script>
    // Mobile hamburger menu toggle
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (btn && sidebar && overlay) {
            btn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('visible');
            });
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                overlay.classList.remove('visible');
            });
            // Close on nav click (mobile)
            sidebar.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('visible');
                });
            });
        }
    });
    </script>
</body>
</html>
