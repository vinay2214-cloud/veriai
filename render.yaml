services:
  - type: web
    name: veriai
    runtime: docker
    # Persistent disks require a paid web-service instance on Render.
    # Use "starter" for durable SQLite demo storage, or migrate app data to
    # Render Postgres if you need to stay on a free web service.
    plan: starter
    healthCheckPath: /health
    disk:
      name: veriai-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: VERIAI_DB_PATH
        value: /var/data/veriai.db
      - key: DATASETS_DIR
        value: /var/data/datasets
      - key: RETENTION_DAYS
        value: "7"
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: MAX_PUBLIC_UPLOAD_MB
        value: "5"
      - key: MAX_PUBLIC_UPLOAD_ROWS
        value: "5000"
      - key: MAX_AUDIT_RECORDS
        value: "75"
      - key: MAX_REVIEW_RECORDS
        value: "100"
      - key: MAX_FEEDBACK_RECORDS
        value: "200"
      - key: MAX_KB_ARTICLES
        value: "75"
      - key: MAX_REPORT_JSON_CHARS
        value: "18000"
      - key: VERIAI_LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: https://veriai-eyxl.onrender.com
      - key: VERIAI_CORS_ORIGINS
        value: https://veriai-eyxl.onrender.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
      - key: JWT_SECRET
        sync: false
      - key: VERIAI_MASTER_KEY
        sync: false
      - key: DB_ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
